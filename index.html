<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Crushy Stars</title>

<style>
body{
  background:#111827;
  color:white;
  font-family:Arial,sans-serif;
  margin:0;
  padding:20px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.balance{
  background:#2563eb;
  padding:10px 15px;
  border-radius:15px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

.gift-card{
  background:#1f2937;
  border-radius:20px;
  padding:15px;
  text-align:center;
  cursor:pointer;
}

.gift-card img{
  width:100%;
  border-radius:15px;
}

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.8);
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:#1f2937;
  padding:20px;
  border-radius:20px;
}
</style>
</head>

<body>

<div class="header">
  <h2>Crushy Stars</h2>
  <div class="balance">⭐ 100</div>
</div>

<div class="grid">

  <div class="gift-card" onclick="openGift('Summer Gift')">
    <img src="https://placehold.co/300x300/png" alt="">
    <h3>Summer Gift</h3>
  </div>

  <div class="gift-card" onclick="openGift('RGB Gift')">
    <img src="https://placehold.co/300x300/png" alt="">
    <h3>RGB Gift</h3>
  </div>

</div>

<div id="giftModal" class="modal">
  <div class="modal-content">
    <h2>🎁 Подарок открыт!</h2>
    <p id="giftText"></p>
    <button onclick="closeGift()">Закрыть</button>
  </div>
</div>

<script>
function openGift(name){
  document.getElementById("giftModal").style.display="flex";
  document.getElementById("giftText").innerText=name;
}

function closeGift(){
  document.getElementById("giftModal").style.display="none";
}
</script>

</body>
</html>
